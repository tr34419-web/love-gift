<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Will You Be Mine? 🥺💗</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:sans-serif;
}

body{
background: linear-gradient(135deg,
#ff4fa0,
#ff7eb3,
#ffc1dc,
#fff0f7,
#ff9ecf);

background-size: 400% 400%;
animation: bgMove 10s ease infinite;

overflow:hidden;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}


.page{
position:absolute;
width:100%;
height:100%;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:20px;
transition:.5s;
}

.hidden{
display:none;
}

h1{
font-size:2.2rem;
color:white;
text-shadow:0 0 10px #ff4fa0,
0 0 20px #ff7eb3,
0 0 30px #ffb3d1;
margin-bottom:15px;
}

p{
color:white;
font-size:18px;
margin-bottom:35px;
}

button{
padding:15px 35px;
font-size:20px;
border:none;
border-radius:999px;
cursor:pointer;
margin:10px;
transition:.25s;
}

.yes{
background:linear-gradient(45deg,#ff4f8b,#ff7eb3);
color:white;
box-shadow:0 0 20px rgba(255,105,180,.6);
transition:.3s;
}

.yes:hover{
transform:scale(1.08);
box-shadow:0 0 30px hotpink;
}

.no{
background:#fff;
color:#ff4f8b;
border:2px solid #ff9ac5;
box-shadow:0 0 15px rgba(255,182,193,.5);
transition: all 0.3s ease;
position:relative;
animation: idleShake 1.2s infinite;
}

.petal{
position:fixed;
top:-30px;
font-size:22px;
animation:fall linear infinite;
pointer-events:none;
  
filter: blur(0.5px);
opacity: 0.9;
}

@keyframes fall{
0%{
transform:translate(0,-30px) rotate(0deg);
opacity:1;
}

100%{
transform:translate(50px,110vh) rotate(360deg);
opacity:0;
}
}
@keyframes idleShake{

0%{
transform:translateX(0);
}

25%{
transform:translateX(-2px) rotate(-2deg);
}

50%{
transform:translateX(2px) rotate(2deg);
}

75%{
transform:translateX(-2px) rotate(-2deg);
}

100%{
transform:translateX(0);
}

}
@keyframes bgMove{
0%{
background-position:0% 50%;
}
50%{
background-position:100% 50%;
}
100%{
background-position:0% 50%;
}
}
.sparkle{
position:fixed;
width:4px;
height:4px;
background:white;
border-radius:50%;
pointer-events:none;
opacity:0.8;
animation: sparkleMove 3s linear forwards;
}

@keyframes sparkleMove{
0%{
transform:translateY(0);
opacity:1;
}
100%{
transform:translateY(-120px);
opacity:0;
}
}
.heart{
position:fixed;
font-size:24px;
animation: floatUp 3s linear forwards;
pointer-events:none;
opacity:0.9;
}

@keyframes floatUp{
0%{
transform:translateY(0) scale(1);
opacity:1;
}
100%{
transform:translateY(-120px) scale(1.5);
opacity:0;
}
}
</style>
  
</head>

<body>

<div id="page1" class="page">

<h1>เธอยังรักเค้าอยู่มั้ย? 🥺💗</h1>

<p>ตอบตามความรู้สึกได้เลยนะ</p>

<div>

<button class="yes" onclick="nextPage()">
ยังรัก 💖
</button>

<button class="no" id="no1">
"ไม่รักแล้ว" 🥺
</button>

</div>

</div>

<div id="page2" class="page hidden">

<h1>งั้น..เป็นแฟนกับเค้ามั้ย 🥺❤️</h1>

<div>

<button class="yes" onclick="finishLove()">
เป็นแฟนกันนะ 💕
</button>

<button class="no" id="no2">
ไม่เป็น
</button>

</div>

</div>

<div id="page3" class="page hidden">

<h1>เย้! รักเธอที่สุดเลยนะรู้มั้ย🥺❤️</h1>

<p>ขอบคุณที่ตอบตกลงนะ 🥺 💕</p>

<div style="font-size:90px;">
💖
</div>

</div>

  <script>
    
function sparkle(){
const s=document.createElement("div");
s.className="sparkle";

s.style.left=Math.random()*100+"vw";
s.style.top=Math.random()*100+"vh";

document.body.appendChild(s);

setTimeout(()=>{s.remove();},3000);
}

setInterval(sparkle,200);

function nextPage(){

document.getElementById("page1").classList.add("hidden");
document.getElementById("page2").classList.remove("hidden");

}

function finishLove(){

document.getElementById("page2").classList.add("hidden");
document.getElementById("page3").classList.remove("hidden");

// 💗 เพิ่มหัวใจรัวๆ
for(let i=0;i<20;i++){
setTimeout(()=>{
const h=document.createElement("div");
h.className="heart";
h.innerHTML="💖";

h.style.left=Math.random()*100+"vw";
h.style.top=(60+Math.random()*40)+"vh";

document.body.appendChild(h);

setTimeout(()=>h.remove(),3000);
},i*80);
}

}

function moveButton(id){

const btn=document.getElementById(id);

btn.addEventListener("touchstart",move);
btn.addEventListener("mouseenter",move);

function move(){

const text=[
"🥺 ไม่เอาน้า",
"😭 คิดดีๆ",
"💖 ลองใหม่สิ",
"🌸 เค้างอนแล้ว",
"🥹 จริงหรอ",
"😖 อย่าปฏิเสธเลย",
"❤️ กดตกลงเถอะ"
"😝ไม่บอก"
];

btn.innerHTML=text[Math.floor(Math.random()*text.length)];

btn.style.transform="scale(.8) rotate(-10deg)";

setTimeout(()=>{
btn.style.transform="scale(1.15) rotate(10deg)";
},80);

setTimeout(()=>{
btn.style.transform="scale(1)";
},180);

const x=Math.random()*(window.innerWidth-150);
const y=Math.random()*(window.innerHeight-90);

btn.style.position="fixed";
btn.style.left=x+"px";
btn.style.top=y+"px";

}
}

moveButton("no1");
moveButton("no2");

function sakura(){

const petal=document.createElement("div");

petal.className="petal";

petal.innerHTML="🌸";

petal.style.left=Math.random()*100+"vw";

petal.style.animationDuration=(4+Math.random()*5)+"s";

petal.style.fontSize=(18+Math.random()*18)+"px";

document.body.appendChild(petal);

setTimeout(()=>{
petal.remove();
},9000);

}

setInterval(sakura,400);

</script>

</body>

</html>

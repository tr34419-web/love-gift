<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You ❤️</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:sans-serif;
}

body{
background:linear-gradient(180deg,#ffb7d5,#ffddea);
overflow:hidden;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.page{
position:absolute;
width:100%;
height:100%;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:20px;
transition:.5s;
}

.hidden{
display:none;
}

h1{
font-size:2.2rem;
color:white;
text-shadow:0 0 15px hotpink;
margin-bottom:15px;
}

p{
color:white;
font-size:18px;
margin-bottom:35px;
}

button{
padding:15px 35px;
font-size:20px;
border:none;
border-radius:999px;
cursor:pointer;
margin:10px;
transition:.25s;
}

.yes{
background:#ff4f8b;
color:white;
}

.no{
background:white;
color:#ff4f8b;
position:relative;
}

.petal{
position:fixed;
top:-30px;
font-size:22px;
animation:fall linear infinite;
pointer-events:none;
}

@keyframes fall{

0%{
transform:translateY(-30px) rotate(0deg);
opacity:1;
}

100%{
transform:translateY(110vh) rotate(360deg);
opacity:0;
}

}
</style>
</head>

<body>

<div id="page1" class="page">

<h1>เธอยังรักเค้าอยู่มั้ย? 🥺💗</h1>

<p>ตอบตามความรู้สึกได้เลยนะ</p>

<div>

<button class="yes" onclick="nextPage()">
ยังรัก 💖
</button>

<button class="no" id="no1">
ไม่รักแล้ว 🥺
</button>

</div>

</div>

<div id="page2" class="page hidden">

<h1>งั้น..เป็นแฟนกับเค้าไหม 🥺❤️</h1>

<div>

<button class="yes" onclick="finishLove()">
ตกลง ❤️
</button>

<button class="no" id="no2">
ไม่
</button>

</div>

</div>

<div id="page3" class="page hidden">

<h1>เย้! รู้แล้วว่าเธอต้องตอบตกลง ❤️</h1>

<p>ขอบคุณที่มาเป็นแฟนกันนะ 💕</p>

<div style="font-size:90px;">
💖
</div>

</div>
<script>

function nextPage(){

document.getElementById("page1").classList.add("hidden");
document.getElementById("page2").classList.remove("hidden");

}

function finishLove(){

document.getElementById("page2").classList.add("hidden");
document.getElementById("page3").classList.remove("hidden");

}

function moveButton(id){

const btn=document.getElementById(id);

btn.addEventListener("touchstart",move);
btn.addEventListener("mouseenter",move);

function move(){

const x=Math.random()*(window.innerWidth-140);
const y=Math.random()*(window.innerHeight-80);

btn.style.position="fixed";
btn.style.left=x+"px";
btn.style.top=y+"px";

}

}

moveButton("no1");
moveButton("no2");

function sakura(){

const petal=document.createElement("div");

petal.className="petal";

petal.innerHTML="🌸";

petal.style.left=Math.random()*100+"vw";

petal.style.animationDuration=(4+Math.random()*5)+"s";

petal.style.fontSize=(18+Math.random()*18)+"px";

document.body.appendChild(petal);

setTimeout(()=>{
petal.remove();
},9000);

}

setInterval(sakura,250);

</script>

</body>

</html>
